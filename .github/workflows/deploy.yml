name: Deploy Portfolio

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
            NEXT_PUBLIC_SERVER_API_URL: https://ficxus.onrender.com/api/admin
            NODE_ENV: production

      - name: Upload build to VM
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: ".next,public,package.json,package-lock.json"
          target: "/var/www/portfolio_frontend"

      - name: Install & Restart on VM
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /var/www/portfolio_frontend
            npm install --production
            pm2 restart portfolio || pm2 start npm --name "portfolio" -- start
            pm2 save
            echo "✅ Portfolio deployed!"